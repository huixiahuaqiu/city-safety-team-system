# 城市安全团队系统 · Nginx 站点配置
# 安装：
#   sudo cp deploy/nginx/conf.d/citysafe-zones.conf /etc/nginx/conf.d/
#   sudo mkdir -p /etc/nginx/snippets
#   sudo cp deploy/nginx/snippets/citysafe-common.conf /etc/nginx/snippets/
#   sudo cp deploy/nginx/citysafe.conf /etc/nginx/sites-available/citysafe.conf
#   编辑 YOUR_DOMAIN 后：
#   sudo ln -sfn /etc/nginx/sites-available/citysafe.conf /etc/nginx/sites-enabled/citysafe.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# limit_req_zone 定义在 conf.d/citysafe-zones.conf（http 上下文），勿放进本文件。

upstream citysafe_gateway {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ============================================================================
# 生产标准：80 仅做 ACME 校验 + 强制 301 跳 443；HTTPS 承载全部业务。
# 首次签发证书（certbot webroot，自带 systemd timer 自动续期）：
#   sudo apt install -y certbot && sudo mkdir -p /var/www/acme
#   # 首签前：先注释下方 443 块、启用 80 的 acme location → nginx -t && reload
#   sudo certbot certonly --webroot -w /var/www/acme -d YOUR_DOMAIN \
#        --deploy-hook "systemctl reload nginx"
#   # 证书就绪后启用 443 块 → nginx -t && systemctl reload nginx
# 禁止自签证书对外服务；证书私钥权限 600。
# ============================================================================

# ---- HTTP：仅放行 ACME 校验，其余强制跳转 HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt / certbot webroot 校验（不可被 301 拦截）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 内网过渡期备选（无域名 / 无证书时）：仅本机或内网直连，严禁公网 0.0.0.0 ----
# 测试阶段若必须走 HTTP：注释上方 80 块与下方 443 块，启用本块，
# 并在 .env 设 BIND_HOST=127.0.0.1。此时 MinIO 直传因非 HTTPS 前缀会自动回退网关代理上传。
# server {
#     listen 127.0.0.1:80;      # 仅本机；内网可改 <内网IP>:80，切勿用 0.0.0.0
#     server_name _;
#     include /etc/nginx/snippets/citysafe-common.conf;
# }

# ---- HTTPS：承载全部业务（证书签发后启用）----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot certonly --webroot 生成的标准路径
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # 仅 TLS 1.2/1.3，禁用弱加密套件
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling（resolver 按本机 DNS 调整；失败仅告警不阻断）
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.53 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # HSTS：确认全站 HTTPS 稳定后再保留 preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    include /etc/nginx/snippets/citysafe-common.conf;
}
