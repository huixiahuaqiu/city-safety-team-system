# 由 citysafe.conf 的 server{} include。
# 安装：sudo mkdir -p /etc/nginx/snippets && sudo cp deploy/nginx/snippets/citysafe-common.conf /etc/nginx/snippets/

root /opt/citysafe/current;
index index.html;

client_max_body_size 220m;
client_body_timeout 600s;
send_timeout 600s;

# ---- 安全响应头 ----
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP 先用 Report-Only，避免打断现有内联脚本 / CDN / Supabase。
# 违规上报到网关 /api/csp-report（审计日志 event=csp_violation），据此持续排查；
# 确认业务无误伤后：①本地化 cdn.jsdelivr.net / tailwindcss ②改用 nonce/hash 放行合法内联
# ③把响应头名改为 Content-Security-Policy（强制）并移除 'unsafe-inline'/'unsafe-eval'。
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://dashscope.aliyuncs.com https://dawn-night-d7ae.1970238795.workers.dev; worker-src 'self' blob: https://cdn.jsdelivr.net; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;
gzip_vary on;

# ---- 前端静态：HTML 不缓存；带版本 query 的 js/css 可长缓存 ----
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location ~* \.(js|css)$ {
    expires 7d;
    add_header Cache-Control "public" always;
    try_files $uri =404;
}

location ~* \.(png|jpg|jpeg|gif|webp|ico|woff2?|svg)$ {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
}

# ---- 数据集分片上传（超大文件 100GB+）：更长超时 + 更大分片体 ----
# 比通用 /api/ 更具体，nginx 按最长前缀优先命中此块。
location /api/dataset/ {
    limit_req zone=citysafe_api burst=60 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    # /complete 对 100GB 级文件做合并 + 校验，耗时可能达数十分钟
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 30s;
    # 单分片 64MB（2× 守卫上限 128MB），留足余量
    client_max_body_size 256m;
}

# ---- API 反代 ----
location /api/ {
    limit_req zone=citysafe_api burst=40 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;
    client_max_body_size 220m;
}

# 登录更严限流（若前端路径不同可改）
location = /api/login {
    limit_req zone=citysafe_login burst=3 nodelay;
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 预签名签发限流
location = /api/shared-file/presign {
    limit_req zone=citysafe_presign burst=20 nodelay;
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# 下载强制附件，杜绝 HTML/SVG 被当页面执行
location /api/shared-file/download {
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
    add_header Content-Disposition "attachment" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}

# 健康检查（给探针用，不计入严格限流）
location = /api/health {
    proxy_pass http://citysafe_gateway;
    proxy_set_header Host $host;
    access_log off;
}

# ---- MinIO 预签名直传反代（仅内网 PUT/GET，桶保持私有）----
# 前端拿到的 uploadUrl 应指向 https://YOUR_DOMAIN/minio-upload/...
location /minio-upload/ {
    limit_req zone=citysafe_presign burst=30 nodelay;
    proxy_pass http://127.0.0.1:9000/;
    proxy_set_header Host 127.0.0.1:9000;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;
    client_max_body_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# ---- 敏感路径禁止 ----
location ~ /\.(git|env|ht|svn) {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(py|pyc|pyo|sqlite|db|log|bak|example|md|sh|service|conf)$ {
    deny all;
    access_log off;
    log_not_found off;
}

location ^~ /uploads/ {
    deny all;
}

location ^~ /logs/ {
    deny all;
}

access_log /var/log/nginx/citysafe.access.log;
error_log  /var/log/nginx/citysafe.error.log warn;
