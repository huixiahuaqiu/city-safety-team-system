# 若站点 conf 放在 sites-available 且 limit_req_zone 报错「directive is not allowed here」，
# 把本文件复制到 /etc/nginx/conf.d/，并从 citysafe.conf 删除对应 limit_req_zone 行。
limit_req_zone $binary_remote_addr zone=citysafe_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=citysafe_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=citysafe_presign:10m rate=10r/s;
