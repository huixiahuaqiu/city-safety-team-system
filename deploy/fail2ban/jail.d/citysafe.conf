# 安装：
#   sudo cp deploy/fail2ban/jail.d/citysafe.conf /etc/fail2ban/jail.d/citysafe.conf
#   sudo cp deploy/fail2ban/filter.d/*.conf /etc/fail2ban/filter.d/
#   sudo systemctl enable --now fail2ban && sudo fail2ban-client reload

[DEFAULT]
bantime  = 1h
findtime = 10m
maxretry = 8
backend  = auto

[sshd]
enabled = true
port    = ssh
maxretry = 5
bantime  = 2h

[citysafe-nginx]
enabled  = true
port     = http,https
filter   = citysafe-nginx
logpath  = /var/log/nginx/citysafe.access.log
maxretry = 20
findtime = 5m
bantime  = 30m

[citysafe-gateway]
enabled  = true
filter   = citysafe-gateway
logpath  = /opt/citysafe/current/logs/server_audit.log
          /opt/citysafe/current/logs/*.log
maxretry = 15
findtime = 10m
bantime  = 1h
