#   StreamDriver="gtls" StreamDriverMode="1" StreamDriverAuthMode="x509/name"
#   queue.type="linkedList" queue.fileName="citysafe_fwd"
#   action.resumeRetryCount="-1" queue.saveOnShutdown="on"
# )
#
# ============================================================================
# 方案 B：Loki + promtail（改用容器/主机 promtail，scrape 同一文件）
# /etc/promtail/config.yml 片段：
#   scrape_configs:
#     - job_name: citysafe-audit
#       static_configs:
#         - targets: [localhost]
#           labels:
#             job: citysafe-audit
#             host: ${HOSTNAME}
#             __path__: /data/logs/*.log
#   clients:
#     - url: http://LOKI_HOST:3100/loki/api/v1/push
# 审计日志为结构化 JSON（event/time/ip/...），Loki 可直接按 event 检索与告警。
# ============================================================================
