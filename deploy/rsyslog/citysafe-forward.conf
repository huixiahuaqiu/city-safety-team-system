# /etc/rsyslog.d/49-citysafe-forward.conf
# 安装：sudo cp deploy/rsyslog/citysafe-forward.conf /etc/rsyslog.d/49-citysafe-forward.conf
#       sudo systemctl restart rsyslog
#
# 目的（P1 进阶 / 可观测性）：把网关审计日志实时转发到远端集中日志平台，
# 本地仍保留 append-only 副本（/data/logs），远端做检索 + 告警 + 长期归档，
# 从根源避免单机故障 / 入侵导致日志丢失。
#
# ┌─ 方案 A：rsyslog → 远端 syslog（本文件默认，改 REMOTE_LOG_HOST 即可）
# └─ 方案 B：Loki + promtail（见文件末注释；容器化集群更友好）

module(load="imfile" PollingInterval="2")

# 跟随审计日志文件（append-only 不影响读取转发）
input(type="imfile"
      File="/data/logs/server_audit.log"
      Tag="citysafe-audit:"
      Severity="info"
      Facility="local5"
      PersistStateInterval="200"
      reopenOnTruncate="on")

# 备份/健康/演练日志一并转发（可选）
input(type="imfile"
      File="/data/logs/health.log"
      Tag="citysafe-health:"
      Severity="info"
      Facility="local5"
      PersistStateInterval="200"
      reopenOnTruncate="on")

# ---- 远端目标：改成你的接收端主机；生产强烈建议 TLS（@@ = TCP，@ = UDP）----
# 明文 TCP（仅内网可信链路）：
local5.*    @@REMOTE_LOG_HOST:6514

# TLS 加密转发（推荐；需先配置 gtls 证书）：
