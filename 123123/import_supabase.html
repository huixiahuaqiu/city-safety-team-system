        function showStatus(msg, type) {
            var el = document.getElementById('statusMessage');
            el.innerHTML = msg;
            el.className = 'status ' + type + ' show';
        }

        function setProgress(pct) {
            var bar = document.getElementById('progressBar');
            var fill = document.getElementById('progressFill');
            bar.classList.add('show');
            fill.style.width = pct + '%';
        }

        function disableAll(disabled) {
            document.getElementById('btnAll').disabled = disabled;
            document.getElementById('btnPatent').disabled = disabled;
            document.getElementById('btnPaper').disabled = disabled;
        }

        // 测试Supabase连接
        function testConnection() {
            showStatus('正在测试连接...', 'info');
            var xhr = new XMLHttpRequest();
            xhr.open('GET', SUPABASE_URL + '/rest/v1/patents?select=id&limit=1', true);
            xhr.setRequestHeader('apikey', SUPABASE_KEY);
            xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 206) {
                        showStatus('连接成功！Supabase数据库已连通。', 'success');
                    } else {
                        showStatus('连接失败：HTTP ' + xhr.status + '\n' + xhr.responseText, 'error');
                    }
                }
            };
            xhr.onerror = function() { showStatus('连接失败：网络错误，请检查网络连接', 'error'); };
            xhr.send();
        }

        function apiInsert(table, records) {
            return new Promise(function(resolve, reject) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', SUPABASE_URL + '/rest/v1/' + table, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('apikey', SUPABASE_KEY);
                xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
                xhr.setRequestHeader('Prefer', 'return=minimal');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve();
                        } else {
                            reject(new Error('HTTP ' + xhr.status + ': ' + xhr.responseText));
                        }
                    }
                };
                xhr.onerror = function() { reject(new Error('网络错误')); };
                xhr.send(JSON.stringify(records));
            });
        }

        function mapPatents() {
            var statusMap = {
                '实审': '实质审查',
                '初审合格': '初审',
                '受理': '受理',
                '一通': '实质审查',
                '已授权': '授权',
                '审查中': '实质审查'
            };
            return patentData.map(function(p) {
                var newStatus = statusMap[p.status] || p.status;
                return {
                    name: p.name,
                    patent_number: p.patentNumber,
                    applicant: p.applicant,
                    unit: p.unit,
                    classification: p.classification,
                    application_date: p.applicationDate,
                    status: newStatus,
                    summary: p.summary,
                    remark: p.remark
                };
            });
        }

        function mapPapers() {
            return paperData.map(function(p) {
                return {
                    title: p.title,
                    author: p.author,
                    journal: p.journal,
                    unit: p.unit,
                    index: p.index,
                    publish_date: p.publishDate,
                    year: p.year,
                    status: p.status,
                    remark: p.remark
                };
            });
        }

        async function importPatents() {
            if (!confirm('确定要导入66条专利数据吗？')) return;
            disableAll(true);
            showStatus('正在导入专利数据...', 'info');
            setProgress(0);
            try {
                var records = mapPatents();
                var batchSize = 10;
                for (var i = 0; i < records.length; i += batchSize) {
                    var batch = records.slice(i, i + batchSize);
                    await apiInsert('patents', batch);
                    setProgress(Math.min(100, Math.round(((i + batch.length) / records.length) * 100)));
                }
                showStatus('成功导入 ' + patentData.length + ' 条专利数据！\n请点击"返回团队管理系统"查看。', 'success');
            } catch (e) {
                showStatus('导入失败：' + e.message, 'error');
            }
            disableAll(false);
        }

        async function importPapers() {
            if (!confirm('确定要导入22条论文数据吗？')) return;
            disableAll(true);
            showStatus('正在导入论文数据...', 'info');
            setProgress(0);
            try {
                var records = mapPapers();
                var batchSize = 10;
                for (var i = 0; i < records.length; i += batchSize) {
                    var batch = records.slice(i, i + batchSize);
                    await apiInsert('papers', batch);
                    setProgress(Math.min(100, Math.round(((i + batch.length) / records.length) * 100)));
                }
                showStatus('成功导入 ' + paperData.length + ' 条论文数据！\n请点击"返回团队管理系统"查看。', 'success');
            } catch (e) {
                showStatus('导入失败：' + e.message, 'error');
            }
            disableAll(false);
        }

        async function importAll() {
            if (!confirm('确定要导入全部数据吗？\n专利：66条\n论文：22条')) return;
            disableAll(true);
            showStatus('正在导入全部数据...', 'info');
            setProgress(0);
            try {
                await apiInsert('patents', mapPatents());
                setProgress(50);
                showStatus('专利导入完成，正在导入论文...', 'info');
                await apiInsert('papers', mapPapers());
                setProgress(100);
                showStatus('全部数据导入成功！\n专利 ' + patentData.length + ' 条，论文 ' + paperData.length + ' 条。\n请点击"返回团队管理系统"查看。', 'success');
            } catch (e) {
                showStatus('导入失败：' + e.message, 'error');
            }
            disableAll(false);
        }
    </script>
