<div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px; color: #333;">📈 校级项目管理</h2>
                    
                    <!-- 顶部操作栏 -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn" onclick="showAddSchoolModal()"> 新增</button>
                            <button class="btn btn-danger" onclick="batchDeleteSchool()">🗑️ 删除</button>
                            <button class="btn btn-secondary" onclick="exportSchool()">📤 导出</button>
                            <button class="btn btn-secondary" onclick="importSchool()"> 导入</button>
                            <button class="btn btn-secondary" onclick="viewSchoolStats()"> 统计</button>
                            <button class="btn btn-secondary" onclick="batchAuditSchool()">✅ 批量审核</button>
                        </div>
                        <button class="btn" style="background: #17a2b8;" onclick="toggleSchoolMoreFilters()">️ 更多条件</button>
                    </div>
                    
                    <!-- 快捷筛选标签 -->
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;" id="schoolFilterTags">
                        <span class="filter-tag active" onclick="filterSchoolByTag('all', this)">全部(<span id="schoolCountAll">0</span>)</span>
                        <span class="filter-tag" onclick="filterSchoolByTag('current_year', this)">当年立项(<span id="schoolCountCurrentYear">0</span>)</span>
                        <span class="filter-tag" onclick="filterSchoolByTag('reviewing', this)">审核中(<span id="schoolCountReviewing">0</span>)</span>
                        <span class="filter-tag" onclick="filterSchoolByTag('approved', this)">已通过(<span id="schoolCountApproved">0</span>)</span>
                        <span class="filter-tag" onclick="filterSchoolByTag('rejected', this)">已驳回(<span id="schoolCountRejected">0</span>)</span>
                    </div>
                    
                    <!-- 查询条件区 -->
                    <div style="background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);" id="schoolFilterPanel">
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                            <div style="flex: 1; min-width: 200px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">项目名称</label>
                                <input type="text" id="schoolFilterName" class="form-control" placeholder="请输入项目名称">
                            </div>
                            <div style="flex: 1; min-width: 200px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">项目编号</label>
                                <input type="text" id="schoolFilterNumber" class="form-control" placeholder="请输入编号">
                            </div>
                            <div style="flex: 1; min-width: 150px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">负责人</label>
                                <input type="text" id="schoolFilterLeader" class="form-control" placeholder="请输入负责人">
                            </div>
                            <div style="flex: 1; min-width: 120px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">立项年度</label>
                                <select id="schoolFilterYear" class="form-control">
                                    <option value="">全部</option>
                                    <option value="2026">2026</option>
                                    <option value="2025">2025</option>
                                    <option value="2024">2024</option>
                                </select>
                            </div>
                            <div style="flex: 1; min-width: 120px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">状态</label>
                                <select id="schoolFilterStatus" class="form-control">
                                    <option value="">全部</option>
                                    <option value="审核中">审核中</option>
                                    <option value="已通过">已通过</option>
                                    <option value="已驳回">已驳回</option>
                                </select>
                            </div>
                            <button class="btn" onclick="applySchoolFilters()" style="height: 38px;"> 快捷查询</button>
                            <button class="btn btn-secondary" onclick="resetSchoolFilters()" style="height: 38px;">🔄 重置</button>
                        </div>
                        
                        <!-- 更多查询条件 -->
                        <div id="schoolMoreFilters" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                            <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                                <div style="flex: 1; min-width: 150px;">
                                    <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">项目类型</label>
                                    <select id="schoolFilterType" class="form-control">
                                        <option value="">全部</option>
                                        <option value="科研项目">科研项目</option>
                                        <option value="教改项目">教改项目</option>
                                        <option value="人才项目">人才项目</option>
                                        <option value="平台项目">平台项目</option>
                                    </select>
                                </div>
                                <div style="flex: 1; min-width: 150px;">
                                    <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">所属单位</label>
                                    <input type="text" id="schoolFilterUnit" class="form-control" placeholder="请输入所属单位">
                                </div>
                                <div style="flex: 1; min-width: 150px;">
                                    <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">立项日期范围</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <input type="date" id="schoolFilterDateFrom" class="form-control" style="flex: 1;">
                                        <span>至</span>
                                        <input type="date" id="schoolFilterDateTo" class="form-control" style="flex: 1;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 数据表格 -->
                    <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden;">
                        <table class="table" style="margin: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="schoolSelectAll" onchange="toggleSchoolSelectAll(this)"></th>
                                    <th>立项年度 <span data-acfilter="school" data-acfield="year" onclick="openSchoolColFilter(event,'year','立项年度')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>项目编号 <span data-acfilter="school" data-acfield="projectNumber" onclick="openSchoolColFilter(event,'projectNumber','项目编号')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>项目名称 <span data-acfilter="school" data-acfield="name" onclick="openSchoolColFilter(event,'name','项目名称')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>项目类型 <span data-acfilter="school" data-acfield="type" onclick="openSchoolColFilter(event,'type','项目类型')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>负责人 <span data-acfilter="school" data-acfield="leader" onclick="openSchoolColFilter(event,'leader','负责人')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>所属单位 <span data-acfilter="school" data-acfield="unit" onclick="openSchoolColFilter(event,'unit','所属单位')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>立项日期 <span data-acfilter="school" data-acfield="startDate" onclick="openSchoolColFilter(event,'startDate','立项日期')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>经费(万元) <span data-acfilter="school" data-acfield="funding" onclick="openSchoolColFilter(event,'funding','经费(万元)')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>状态 <span data-acfilter="school" data-acfield="status" onclick="openSchoolColFilter(event,'status','状态')" title="按此列筛选" style="cursor:pointer;color:#9ca3af;font-size:11px;">▼</span></th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="schoolTableBody">
                                <!-- 数据将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                        <div style="padding: 15px; text-align: center; color: #666; border-top: 1px solid #eee;" id="schoolEmptyMessage">
                            暂无数据
                        </div>
                    </div>
                </div>
                
                <!-- 新增/编辑校级项目弹窗 -->
                <div id="schoolModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
                    <div style="background: #fff; padding: 30px; border-radius: 12px; width: 600px; max-height: 80vh; overflow-y: auto;">
                        <h3 style="margin-bottom: 20px; color: #333;" id="schoolModalTitle">新增校级项目</h3>
                        <div class="form-group">
                            <label>项目名称 *</label>
                            <input type="text" id="schoolName" class="form-control" placeholder="请输入项目名称">
                        </div>
                        <div class="form-group">
                            <label>项目编号 *</label>
                            <input type="text" id="schoolProjectNumber" class="form-control" placeholder="如：CQUST-2026-001">
                        </div>
                        <div class="form-group">
                            <label>负责人 *</label>
                            <input type="text" id="schoolLeader" class="form-control" placeholder="请输入负责人">
                        </div>
                        <div class="form-group">
                            <label>所属单位 *</label>
                            <input type="text" id="schoolUnit" class="form-control" placeholder="请输入所属单位">
                        </div>
                        <div class="form-group">
                            <label>项目类型 *</label>
                            <select id="schoolType" class="form-control">
                                <option value="">请选择项目类型</option>
                                <option value="科研项目">科研项目</option>
                                <option value="教改项目">教改项目</option>
                                <option value="人才项目">人才项目</option>
                                <option value="平台项目">平台项目</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>立项日期 *</label>
                            <input type="date" id="schoolStartDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>经费(万元) *</label>
                            <input type="number" id="schoolFunding" class="form-control" placeholder="请输入经费金额" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select id="schoolStatus" class="form-control">
                                <option value="审核中">审核中</option>
                                <option value="已通过">已通过</option>
                                <option value="已驳回">已驳回</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>上传附件</label>
                            <input type="file" id="schoolFile" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>备注</label>
                            <textarea id="schoolRemark" class="form-control" rows="3" placeholder="请输入备注信息"></textarea>
                        </div>
                        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                            <button class="btn btn-secondary" onclick="closeSchoolModal()">取消</button>
                            <button class="btn" onclick="saveSchool()">保存</button>
                        </div>
                    </div>
                </div>
