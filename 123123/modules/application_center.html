<div style="padding: 22px 24px 18px; background: linear-gradient(180deg, #ffffff 0%, #f8f9ff 100%); border-bottom: 1px solid #eef0f5;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;">
                        <div>
                            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                                <h1 style="font-size: 24px; font-weight: 700; color: #1f2937; margin: 0;">请假与申请</h1>
                                <span id="appRoleBadge" style="display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#4f46e5;font-size:12px;font-weight:600;"></span>
                            </div>
                            <p style="font-size: 13px; color: #6b7280; margin: 6px 0 0;" id="appSubtitle">类型化申请 · 二级审批 · 业务联动 · 云端同步</p>
                        </div>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button class="btn btn-secondary" id="appFlowCfgBtn" onclick="showApprovalFlowConfig()" style="padding: 10px 16px; font-size: 13px; display:none;">流程配置</button>
                            <button class="btn btn-secondary" id="appExportBtn" onclick="exportApplicationRecords()" style="padding: 10px 16px; font-size: 13px; display:none;">导出记录</button>
                            <button class="btn" id="appNewBtn" onclick="showApplicationCreateModal()" style="padding: 10px 20px; font-size: 13px;">新建申请</button>
                        </div>
                    </div>
                    <div id="appTabBar" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 4px;"></div>
                    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px;">
                        <div style="flex: 1; min-width: 200px;">
                            <input type="text" id="appSearchInput" placeholder="搜索申请人 / 编号 / 事由..."
                                style="width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; background:#fff;"
                                oninput="if(typeof renderApplicationCenter==='function')renderApplicationCenter()">
                        </div>
                        <select id="appStatusFilter" style="padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; min-width: 110px; background:#fff;" onchange="if(typeof onApplicationFilterChange==='function')onApplicationFilterChange()">
                            <option value="">全部状态</option>
                            <option value="draft">草稿</option>
                            <option value="pending">待审批</option>
                            <option value="reviewing">审批中</option>
                            <option value="approved">已通过</option>
                            <option value="rejected">已驳回</option>
                            <option value="withdrawn">已撤回</option>
                        </select>
                        <select id="appCategoryFilter" style="padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; min-width: 120px; background:#fff;" onchange="if(typeof renderApplicationCenter==='function')renderApplicationCenter()">
                            <option value="">全部类型</option>
                            <option value="leave">请假</option>
                            <option value="trip">出差</option>
                            <option value="equipment">设备借用</option>
                            <option value="reimburse">经费报销</option>
                            <option value="stay">假期留校</option>
                            <option value="defense">开题/答辩</option>
                            <option value="other">其他申请</option>
                        </select>
                        <input type="date" id="appDateFrom" title="提交日起" style="padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; background:#fff;" onchange="if(typeof renderApplicationCenter==='function')renderApplicationCenter()">
                        <input type="date" id="appDateTo" title="提交日止" style="padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; background:#fff;" onchange="if(typeof renderApplicationCenter==='function')renderApplicationCenter()">
                        <select id="appApplicantFilter" style="padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; min-width: 120px; background:#fff; display:none;" onchange="if(typeof renderApplicationCenter==='function')renderApplicationCenter()">
                            <option value="">全部申请人</option>
                        </select>
                    </div>
                    <div id="appBatchBar" style="display:none; margin-top:12px; padding:10px 14px; background:#eef2ff; border-radius:10px; align-items:center; gap:10px; flex-wrap:wrap;">
                        <span id="appBatchCount" style="font-size:13px;color:#4338ca;font-weight:600;">已选 0 项</span>
                        <button class="btn" style="padding:6px 12px;font-size:12px;background:#16a34a;" onclick="batchApproveApplications()">批量通过</button>
                        <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;" onclick="clearApplicationSelection()">取消选择</button>
                    </div>
                </div>
                <div style="padding: 20px 24px 28px; background: #f5f7fa;">
                    <div id="appStatCards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 18px;"></div>
                    <div id="applicationEmptyState" style="display: none; text-align: center; padding: 64px 20px; background:#fff; border-radius:16px; border:1px dashed #d1d5db;">
                        <div style="font-size: 42px; margin-bottom: 12px; opacity:.85;">📝</div>
                        <h3 style="font-size: 18px; color: #111827; margin-bottom: 8px;">暂无申请</h3>
                        <p style="font-size: 14px; color: #6b7280; margin-bottom: 18px;">选择类型模板提交后，可在此跟踪审批进度</p>
                        <button class="btn" onclick="showApplicationCreateModal()">新建申请</button>
                    </div>
                    <div id="applicationList"></div>
                </div>
