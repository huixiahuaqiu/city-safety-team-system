<div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px; color: #333;">📋 专利台账管理</h2>
                    
                    <!-- 顶部操作栏 -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn" onclick="showAddPatentMgmtModal()"> 新增</button>
                            <button class="btn btn-danger" onclick="batchDeletePatentMgmt()">🗑️ 删除</button>
                            <button class="btn btn-secondary" onclick="exportPatentMgmt()"> 导出</button>
                            <button class="btn btn-secondary" onclick="importPatentMgmt()">📥 导入</button>
                            <button class="btn btn-secondary" onclick="viewPatentMgmtStats()">📊 统计</button>
                            <button class="btn btn-secondary" onclick="batchAuditPatentMgmt()">✅ 批量审核</button>
                        </div>
                        <button class="btn" style="background: #17a2b8;" onclick="togglePatentMgmtMoreFilters()">️ 更多条件</button>
                    </div>
                    
                    <!-- 快捷筛选标签 -->
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;" id="patentMgmtFilterTags">
                        <span class="filter-tag active" onclick="filterPatentMgmtByTag('all', this)">全部(<span id="patentMgmtCountAll">0</span>)</span>
                        <span class="filter-tag" onclick="filterPatentMgmtByTag('current_year', this)">当年申请(<span id="patentMgmtCountCurrentYear">0</span>)</span>
                        <span class="filter-tag" onclick="filterPatentMgmtByTag('reviewing', this)">实质审查(<span id="patentMgmtCountReviewing">0</span>)</span>
                        <span class="filter-tag" onclick="filterPatentMgmtByTag('approved', this)">授权(<span id="patentMgmtCountApproved">0</span>)</span>
                        <span class="filter-tag" onclick="filterPatentMgmtByTag('rejected', this)">无效(<span id="patentMgmtCountRejected">0</span>)</span>
                    </div>
                    
                    <!-- 查询条件区 -->
                    <div style="background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);" id="patentMgmtFilterPanel">
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                            <div style="flex: 1; min-width: 200px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">专利名称</label>
                                <input type="text" id="patentMgmtFilterName" class="form-control" placeholder="请输入专利名称">
                            </div>
                            <div style="flex: 1; min-width: 200px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">专利号</label>
                                <input type="text" id="patentMgmtFilterNumber" class="form-control" placeholder="请输入专利号">
                            </div>
                            <div style="flex: 1; min-width: 150px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">申请人</label>
                                <input type="text" id="patentMgmtFilterApplicant" class="form-control" placeholder="请输入申请人">
                            </div>
                            <div style="flex: 1; min-width: 120px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">所属年度</label>
                                <select id="patentMgmtFilterYear" class="form-control">
                                    <option value="">全部</option>
                                    <option value="2026">2026</option>
                                    <option value="2025">2025</option>
                                    <option value="2024">2024</option>
                                </select>
                            </div>
                            <div style="flex: 1; min-width: 120px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">状态</label>
                                <select id="patentMgmtFilterStatus" class="form-control">
                                    <option value="">全部</option>
                                    <option value="申请">申请</option>
                                <option value="受理">受理</option>
                                <option value="初审">初审</option>
                                <option value="公布">公布</option>
                                <option value="实质审查">实质审查</option>
                                <option value="授权">授权</option>
                                <option value="届满">届满</option>
                                <option value="无效">无效</option>
                                </select>
                            </div>
                            <button class="btn" onclick="applyPatentMgmtFilters()" style="height: 38px;">🔍 快捷查询</button>
                            <button class="btn btn-secondary" onclick="resetPatentMgmtFilters()" style="height: 38px;">🔄 重置</button>
                        </div>
                        
                        <!-- 更多查询条件 -->
                        <div id="patentMgmtMoreFilters" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                            <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                                <div style="flex: 1; min-width: 150px;">
                                    <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">分类</label>
                                    <select id="patentMgmtFilterClassification" class="form-control">
                                        <option value="">全部</option>
                                        <option value="能源技术">能源技术</option>
                                        <option value="人工智能">人工智能</option>
                                        <option value="城市安全">城市安全</option>
                                        <option value="土木水利">土木水利</option>
                                    </select>
                                </div>
                                <div style="flex: 1; min-width: 150px;">
                                    <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">申请日期范围</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <input type="date" id="patentMgmtFilterDateFrom" class="form-control" style="flex: 1;">
                                        <span>至</span>
                                        <input type="date" id="patentMgmtFilterDateTo" class="form-control" style="flex: 1;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 数据表格 -->
                    <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden;">
                        <table class="table" style="margin: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="patentMgmtSelectAll" onchange="togglePatentMgmtSelectAll(this)"></th>
                                    <th onclick="sortPatentMgmtTable('patentType')" style="cursor: pointer;">专利类型 </th>
                                    <th onclick="sortPatentMgmtTable('name')" style="cursor: pointer;">专利名称 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('patentNumber')" style="cursor: pointer;">专利号 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('announcementNumber')" style="cursor: pointer;">授权公告号 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('grantDate')" style="cursor: pointer;">授权日 </th>
                                    <th onclick="sortPatentMgmtTable('applicant')" style="cursor: pointer;">申请人 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('inventor')" style="cursor: pointer;">发明人 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('classification')" style="cursor: pointer;">专利所属类别 ⇅</th>
                                    <th onclick="sortPatentMgmtTable('status')" style="cursor: pointer;">状态 ⇅</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="patentMgmtTableBody">
                                <!-- 数据将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                        <div style="padding: 15px; text-align: center; color: #666; border-top: 1px solid #eee;" id="patentMgmtEmptyMessage">
                            暂无数据
                        </div>
                    </div>
                </div>
                
                <!-- 新增/编辑专利弹窗 -->
                <div id="patentMgmtModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
                    <div style="background: #fff; padding: 30px; border-radius: 12px; width: 600px; max-height: 80vh; overflow-y: auto;">
                        <h3 style="margin-bottom: 20px; color: #333;" id="patentMgmtModalTitle">新增专利</h3>
                        <div class="form-group">
                            <label>专利类型</label>
                            <select id="patentMgmtPatentType" class="form-control">
                                <option value="发明专利">发明专利</option>
                                <option value="实用新型">实用新型</option>
                                <option value="外观设计">外观设计</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>专利名称 *</label>
                            <input type="text" id="patentMgmtName" class="form-control" placeholder="请输入专利名称">
                        </div>
                        <div class="form-group">
                            <label>专利号 *</label>
                            <input type="text" id="patentMgmtPatentNumber" class="form-control" placeholder="如：ZL202610001234.5">
                        </div>
                        <div class="form-group">
                            <label>授权公告号</label>
                            <input type="text" id="patentMgmtAnnouncementNumber" class="form-control" placeholder="如：CN107000123A">
                        </div>
                        <div class="form-group">
                            <label>授权日</label>
                            <input type="date" id="patentMgmtGrantDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>申请人 *</label>
                            <input type="text" id="patentMgmtApplicant" class="form-control" placeholder="请输入申请人">
                        </div>
                        <div class="form-group">
                            <label>发明人</label>
                            <input type="text" id="patentMgmtInventor" class="form-control" placeholder="请输入发明人">
                        </div>
                        <div class="form-group">
                            <label>专利所属类别 *</label>
                            <select id="patentMgmtClassification" class="form-control">
                                <option value="">请选择类别</option>
                                <option value="能源技术">能源技术</option>
                                <option value="人工智能">人工智能</option>
                                <option value="城市安全">城市安全</option>
                                <option value="土木水利">土木水利</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>申请日期 *</label>
                            <input type="date" id="patentMgmtApplicationDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select id="patentMgmtStatus" class="form-control">
                                <option value="申请">申请</option>
                                <option value="受理">受理</option>
                                <option value="初审">初审</option>
                                <option value="公布">公布</option>
                                <option value="实质审查">实质审查</option>
                                <option value="授权">授权</option>
                                <option value="届满">届满</option>
                                <option value="无效">无效</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>上传附件</label>
                            <input type="file" id="patentMgmtFile" class="form-control" accept="image/*">
                            <div id="patentImagePreview" style="display: none; margin-top: 10px; text-align: center;">
                                <img id="patentImagePreviewImg" style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #e9ecef;">
                                <div style="margin-top: 10px;">
                                    <button class="btn" style="background: #28a745;" onclick="recognizePatentCertificate(this)">📷 识别并自动填充</button>
                                    <button class="btn btn-secondary" onclick="clearPatentImage()">清除图片</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>摘要</label>
                            <textarea id="patentMgmtSummary" class="form-control" rows="3" placeholder="请输入专利摘要"></textarea>
                        </div>
                        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                            <button class="btn btn-secondary" onclick="closePatentMgmtModal()">取消</button>
                            <button class="btn" onclick="savePatentMgmt()">保存</button>
                        </div>
                    </div>
                </div>
